<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彰化縣公車候車亭動態查詢系統</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <!-- Google 字型 Inter & Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Lucide 圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }
        /* 自訂 Leaflet 彈出視窗與控制項樣式 */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 4px;
        }
        .leaflet-popup-tip {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .leaflet-bar {
            border: none !important;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06) !important;
            border-radius: 8px !important;
            overflow: hidden;
        }
        .leaflet-bar a {
            border-bottom: 1px solid #f1f5f9 !important;
        }
        /* 美化捲軸 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="h-full overflow-hidden bg-slate-50 flex flex-col md:flex-row">

    <!-- 手機版 Header -->
    <header class="md:hidden bg-brand-800 text-white p-4 flex items-center justify-between shadow-md shrink-0">
        <div class="flex items-center space-x-2">
            <i data-lucide="bus" class="w-6 h-6 text-sky-300"></i>
            <h1 class="font-bold text-lg tracking-wide">彰化縣公車候車亭動態地圖</h1>
        </div>
        <button id="toggle-sidebar-mobile" class="p-2 hover:bg-brand-700 rounded-lg transition duration-200" aria-label="Toggle Menu">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </header>

    <!-- 側邊控制與清單面板 (Sidebar) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-[2000] w-80 md:w-96 bg-white shadow-2xl flex flex-col transform -translate-x-full md:translate-x-0 md:static transition-all duration-300 ease-in-out shrink-0 h-full">
        
        <!-- 桌上型電腦版 浮動收折按鈕 -->
        <button id="sidebar-collapse-trigger" class="hidden md:flex absolute top-1/2 -translate-y-1/2 -right-4 z-[2001] bg-white border border-slate-200 text-slate-500 hover:text-brand-600 w-8 h-16 rounded-r-xl shadow-lg items-center justify-center transition-all duration-200 hover:bg-slate-50 focus:outline-none" title="收折/展開面板">
            <i id="collapse-icon" data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>

        <!-- 側邊欄 Header -->
        <div class="p-5 bg-gradient-to-r from-brand-800 to-brand-700 text-white relative shrink-0">
            <button id="close-sidebar-mobile" class="absolute top-5 right-5 md:hidden text-white/80 hover:text-white">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div class="flex items-center space-x-3 mb-2">
                <div class="p-2 bg-white/10 rounded-lg">
                    <i data-lucide="map-pin" class="w-6 h-6 text-sky-300"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">候車亭動態查詢</h1>
            </div>
            <p class="text-xs text-sky-100 opacity-90">提供彰化全縣公車候車亭座標、行政區與座落位置即時地圖檢索</p>
        </div>

        <!-- 篩選與搜尋區域 -->
        <div class="p-4 border-b border-slate-100 bg-slate-50/50 space-y-3 shrink-0">
            <!-- 鄉鎮市下拉選單 -->
            <div>
                <label for="town-filter" class="block text-xs font-semibold text-slate-500 mb-1 tracking-wider uppercase">行政區域篩選</label>
                <div class="relative">
                    <select id="town-filter" class="w-full pl-3 pr-10 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-600 focus:border-brand-600 appearance-none shadow-sm cursor-pointer transition">
                        <option value="all">全部鄉鎮市 (載入中...)</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <!-- 智慧分類標籤 -->
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5 tracking-wider uppercase">站點屬性快速篩選</label>
                <div class="flex flex-wrap gap-1.5" id="category-tags">
                    <button data-category="all" class="category-btn px-2.5 py-1 text-xs font-medium rounded-full bg-brand-600 text-white shadow-sm transition">
                        全部
                    </button>
                    <button data-category="transit" class="category-btn px-2.5 py-1 text-xs font-medium rounded-full bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition">
                        🚉 軌道/轉運
                    </button>
                    <button data-category="school" class="category-btn px-2.5 py-1 text-xs font-medium rounded-full bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition">
                        🏫 學校文教
                    </button>
                    <button data-category="office" class="category-btn px-2.5 py-1 text-xs font-medium rounded-full bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition">
                        🏢 機關醫院
                    </button>
                </div>
            </div>

            <!-- 關鍵字搜尋框 -->
            <div>
                <label for="search-input" class="block text-xs font-semibold text-slate-500 mb-1 tracking-wider uppercase">名稱或地址關鍵字</label>
                <div class="relative">
                    <input type="text" id="search-input" placeholder="輸入候車亭名稱、路名或地標..." class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-600 focus:border-brand-600 shadow-sm transition">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </div>
                    <button id="clear-search" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 hidden">
                        <i data-lucide="x-circle" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- 地址高精度定位校正開關 -->
            <div class="flex items-center justify-between p-2.5 bg-sky-50 rounded-lg border border-sky-100">
                <div class="flex items-center space-x-2">
                    <i data-lucide="satellite" class="w-4 h-4 text-brand-600 animate-pulse"></i>
                    <span class="text-xs font-semibold text-slate-700">點擊即時啟動地址高精度校正</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="toggle-calibration" class="sr-only peer" checked>
                    <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-brand-600"></div>
                </label>
            </div>
        </div>

        <!-- 即時數據統計 -->
        <div class="px-4 py-3 border-b border-slate-100 bg-white flex justify-between items-center shrink-0">
            <span class="text-xs font-medium text-slate-500">篩選結果統計</span>
            <div class="flex items-center space-x-2">
                <span id="stats-count" class="px-2 py-0.5 bg-brand-100 text-brand-800 text-xs font-bold rounded-full">0 站</span>
                <span id="stats-towns" class="px-2 py-0.5 bg-emerald-100 text-emerald-800 text-xs font-bold rounded-full">0 區</span>
            </div>
        </div>

        <!-- 候車亭清單 -->
        <div class="flex-1 overflow-y-auto divide-y divide-slate-100" id="shelter-list">

            <div class="p-8 text-center text-slate-400 flex flex-col items-center justify-center space-y-2">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-brand-600"></i>
                <p class="text-sm">資料載入中，請稍候...</p>
            </div>
        </div>

        <div class="p-3 bg-slate-50 border-t border-slate-100 text-center text-xs text-slate-400 shrink-0 flex items-center justify-between">
            <span>資料來源：彰化縣政府</span>
            <span class="flex items-center text-brand-600 font-medium">

            </span>

    <!-- 地圖主區域 -->
    <main class="flex-1 relative h-full">
        <!-- 地圖容器 -->
        <div id="map" class="w-full h-full"></div>

        <!-- 頂部自訂任意地址定位搜尋面板 -->
        <div class="absolute top-4 left-4 md:left-[104px] z-[1000] bg-white/95 backdrop-blur-md p-3 rounded-xl shadow-lg border border-slate-200/80 max-w-xs md:max-w-md w-[calc(100%-2rem)] md:w-96 pointer-events-auto">
            <div class="space-y-2">
                <div class="flex items-center space-x-2">

                    <div class="relative flex-1">

                        <div class="absolute inset-y-0 left-0 flex items-center pl-2.5 pointer-events-none text-slate-400">
                            <i data-lucide="navigation" class="w-3.5 h-3.5"></i>
                        </div>
                    </div>
                    <button id="btn-search-address" class="px-3 py-1.5 bg-orange-500 hover:bg-orange-600 text-white text-xs font-bold rounded-lg shadow-sm transition-all duration-200 flex items-center space-x-1 shrink-0">
                        <span>定位</span>
                    </button>
                </div>
            </div>
        </div>

                <button id="layer-light" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-white text-slate-600 hover:text-slate-800 hover:bg-slate-50 transition">
                    明亮

                    極黑

            <i data-lucide="info" class="w-4 h-4 text-sky-400"></i>

    </main>

        function getStationCategory(item) {
            const name = item.name;
            if (name.includes("火車站") || name.includes("轉運站") || name.includes("高鐵")) {
                return 'transit';
            }
            if (name.includes("國中") || name.includes("高中") || name.includes("高商") || name.includes("高工") || name.includes("大學") || name.includes("國小") || name.includes("商工")) {
                return 'school';

        function initMap() {
            // 中心點設在彰化縣中心位置附近
            map = L.map('map', {
                center: [23.98, 120.48],
                zoom: 11,
                layers: [layers.osm], // 預設使用標準 OSM 圖資
                zoomControl: false // 手動放置 Zoom 控制項以調度版面
            });

            // 將縮放控制項移到右下角，避免與頂部面板衝突
            L.control.zoom({
                position: 'bottomright'
            }).addTo(map);

            // 初始化 MarkerCluster 並套用極具現代感的自訂聚合外觀
            markerClusterGroup = L.markerClusterGroup({
                showCoverageOnHover: false,
                maxClusterRadius: 50,
                iconCreateFunction: function(cluster) {
                    var childCount = cluster.getChildCount();
                    var colorClass = 'bg-brand-600';
                    if (childCount < 5) {
                        colorClass = 'bg-teal-500';
                    } else if (childCount < 15) {
                        colorClass = 'bg-sky-600';
                    } else {
                        colorClass = 'bg-brand-800';
                    }
                    return L.divIcon({
                        html: `
                            <div class="flex items-center justify-center w-10 h-10 rounded-full text-white ${colorClass} font-bold shadow-lg border-2 border-white ring-4 ring-white/20">
                                <span>${childCount}</span>
                            </div>`,
                        className: 'custom-cluster-marker',
                        iconSize: [40, 40]
                    });
                }
            });

            map.addLayer(markerClusterGroup);
        }

        function initFilters() {
            const townFilterSelect = document.getElementById('town-filter');
            
            // 計算各個鄉鎮市的站點數目
            const townCounts = {};
            data.forEach(item => {
                const town = item.town || "未分類";
                townCounts[town] = (townCounts[town] || 0) + 1;
            });

            // 取得排序後的鄉鎮市列表
            const sortedTowns = Object.keys(townCounts).sort();

            // 生成下拉選項
            let optionsHTML = `<option value="all" class="text-slate-800 font-medium">全部鄉鎮市 (${data.length} 站)</option>`;
            sortedTowns.forEach(town => {
                optionsHTML += `<option value="${town}">${town} (${townCounts[town]} 站)</option>`;
            });

            townFilterSelect.innerHTML = optionsHTML;
        }

            let destinationAddress = item.address;
            if (!destinationAddress.startsWith("彰化")) {
                destinationAddress = "彰化縣" + (item.town || "") + destinationAddress;
            }
            // 去除不必要的修飾詞以提昇搜尋精準度
            const cleanDestinationAddress = destinationAddress.replace(/(對面|旁|\(南行\)|\(北行\))/g, '').trim();

                    <div class="flex items-center justify-between mb-2 gap-1.5">

                    <div class="pt-2 border-t border-slate-100 flex items-center justify-between">
                        <span class="text-[10px] text-slate-400">經緯度: ${item.lat.toFixed(4)}, ${item.lng.toFixed(4)}</span>
                        <a href="${googleMapUrl}" target="_blank" class="px-2.5 py-1 bg-brand-600 hover:bg-brand-700 !text-white text-[11px] font-medium rounded-md shadow-sm transition flex items-center space-x-1 no-underline" style="color: white !important;">
                            <span class="!text-white">導航</span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: white !important;"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            const townFilter = document.getElementById('town-filter').value;
            const searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            const listContainer = document.getElementById('shelter-list');

            // 1. 清除地圖上現有的候車亭 Marker
            markerClusterGroup.clearLayers();
            markersMap.clear();

            // 2. 進行多重篩選 (行政區 + 屬性分類 + 關鍵字)
            const filteredData = data.filter(item => {
                const matchesTown = (townFilter === 'all' || item.town === townFilter);
                
                const matchesCategory = (currentCategory === 'all' || getStationCategory(item) === currentCategory);
                
                const matchesSearch = !searchQuery || 
                                      item.name.toLowerCase().includes(searchQuery) || 
                                      item.address.toLowerCase().includes(searchQuery);
                return matchesTown && matchesCategory && matchesSearch;
            });

            // 3. 更新數據看板
            document.getElementById('stats-count').textContent = `${filteredData.length} 站`;
            const activeTowns = new Set(filteredData.map(item => item.town)).size;
            document.getElementById('stats-towns').textContent = `${activeTowns} 區`;

            // 4. 若篩選結果為空
            if (filteredData.length === 0) {
                listContainer.innerHTML = `
                    <div class="p-8 text-center text-slate-400 flex flex-col items-center justify-center space-y-2">
                        <i data-lucide="info" class="w-8 h-8 text-slate-300"></i>
                        <p class="text-sm font-medium">查無對應的候車亭</p>
                        <p class="text-xs text-slate-400">請嘗試更換篩選條件或關鍵字</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // 5. 渲染側邊欄清單並同步加載到地圖上
            let listHTML = '';
            
            filteredData.forEach((item, index) => {
                // 建立 Leaflet Marker
                const marker = L.marker([item.lat, item.lng], { icon: customBusIcon });
                
                // 設定彈出氣泡框
                marker.bindPopup(createPopupContent(item));
                
                // 儲存 Marker 物件至快取 Map
                // 注意：使用站點在原始 'data' 陣列中的真正索引，以便校正時精準修改原始資料
                const realIndex = data.indexOf(item);
                const stationId = `station-${realIndex}`;
                markersMap.set(stationId, marker);
                markerClusterGroup.addLayer(marker);

                // 產生分類對應圖示
                let catBadge = "📍 一般";
                const catType = getStationCategory(item);
                if (catType === 'transit') catBadge = "🚉 交通樞紐";
                if (catType === 'school') catBadge = "🏫 學校周邊";
                if (catType === 'office') catBadge = "🏢 公共機關";

                // 生成清單 HTML Item
                listHTML += `
                    <div onclick="focusStation('${stationId}', ${item.lat}, ${item.lng}, ${realIndex})" 
                         class="p-4 hover:bg-slate-50 border-l-4 border-transparent hover:border-brand-600 transition duration-150 cursor-pointer flex justify-between items-start group">
                        <div class="space-y-1 pr-3">
                            <div class="flex items-center space-x-1.5">
                                <span class="inline-block px-1.5 py-0.5 bg-slate-100 group-hover:bg-brand-100 group-hover:text-brand-800 text-[10px] font-bold text-slate-600 rounded transition">
                                    ${item.town}
                                </span>
                                <span class="text-[10px] font-medium text-slate-400">
                                    ${catBadge}
                                </span>
                                ${item.calibrated ? `
                                <span class="inline-flex items-center px-1 py-0.5 bg-emerald-50 text-emerald-700 text-[9px] font-bold rounded">
                                    ✓ 已校正
                                </span>` : ''}
                            </div>
                            <h4 class="text-sm font-bold text-slate-800 group-hover:text-brand-700 transition">
                                ${item.name}
                            </h4>
                            <p class="text-xs text-slate-500 line-clamp-2">
                                ${item.address}
                            </p>
                        </div>
                        <span class="shrink-0 text-slate-300 group-hover:text-brand-600 p-1 rounded-lg hover:bg-slate-100 transition">
                            <i data-lucide="compass" class="w-4 h-4"></i>
                        </span>
                    </div>
                `;
            });

            listContainer.innerHTML = listHTML;
            lucide.createIcons(); // 重新綁定圖標
        }

        // 開放地理編碼服務 (OSM Nominatim Geocoding API)
        async function geocodeAddress(address, town) {
            // 建構一個完整的查詢字串
            let query = address;
            if (!query.includes("彰化")) {
                query = "彰化縣" + (town || "") + query;
            }
            // 清除對面、旁、(南行)、(北行)等干擾 Nominatim 門牌精準定位的雜訊
            query = query.replace(/(對面|旁|\(南行\)|\(北行\))/g, '').trim();

            const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
            
            try {
                const response = await fetch(url, {
                    headers: {
                        'Accept-Language': 'zh-TW,zh;q=0.9',
                        'User-Agent': 'ChanghuaBusShelterMap/1.0 (contact: busmap@example.com)'
                    }
                });
                if (!response.ok) throw new Error("API Network error");
                const results = await response.json();
                if (results && results.length > 0) {
                    return {
                        lat: parseFloat(results[0].lat),
                        lng: parseFloat(results[0].lon)
                    };
                }
            } catch (err) {
                console.error("地址地理編碼解析失敗:", query, err);
            }
            return null;
        }

        // 當使用者點選側邊欄站點時 (支援即時地址校正)
        async function focusStation(id, lat, lng, realIndex) {
            const marker = markersMap.get(id);
            if (!marker) return;

            const item = data[realIndex];
            const isCalibrationEnabled = document.getElementById('toggle-calibration').checked;

            let targetLat = lat;
            let targetLng = lng;

            // 如果啟用校正，且該站點尚未校正過，則即時連線校正地址
            if (isCalibrationEnabled && !item.calibrated) {
                showToast(`正在連線校正地址座標...`);
                const preciseCoord = await geocodeAddress(item.address, item.town);
                
                if (preciseCoord) {
                    // 更新記憶體中的座標
                    item.lat = preciseCoord.lat;
                    item.lng = preciseCoord.lng;
                    item.calibrated = true; // 標記為已校正
                    
                    targetLat = preciseCoord.lat;
                    targetLng = preciseCoord.lng;

                    // 平滑修改地圖標記座標並重新渲染 Popup 氣泡資訊
                    marker.setLatLng([targetLat, targetLng]);
                    marker.setPopupContent(createPopupContent(item));
                    
                    // 重繪清單列表 (使 ✓已校正 徽章即時出現在左側)
                    renderDashboard();
                    showToast(`✅ 地址校正成功！已位移至高精度實體門牌位置`);
                } else {
                    showToast(`⚠️ 地址庫未寻獲此門牌，已退回使用預估座標`);
                }
            }

            // 縮小側邊欄 (如果是手機版操作)
            if (window.innerWidth < 768) {
                toggleSidebarMobile(false);
            }

            // 平滑飛向最終座標
            map.flyTo([targetLat, targetLng], 17, {
                animate: true,
                duration: 1.5
            });

            // 待動畫快結束時自動開啟氣泡窗
            setTimeout(() => {
                if (markerClusterGroup.hasLayer(marker)) {
                    markerClusterGroup.zoomToShowLayer(marker, function() {
                        marker.openPopup();
                    });
                } else {
                    marker.openPopup();
                }
            }, 1200);
        }

        // 自訂地址查詢並圈選最近 3 站公車亭
        async function searchCustomAddress() {
            const inputVal = document.getElementById('custom-address-input').value.trim();
            if (!inputVal) {
                showToast("請先輸入您要定位的地址");
                return;
            }

            showToast("正在解析該地址之高精度經緯度...");
            const coord = await geocodeAddress(inputVal, "");

            if (!coord) {
                showToast("🔍 找不到該地址，請輸入更具體的地標或路名門牌");
                return;
            }

            // 1. 移除先前自訂的定位大頭針與連線
            if (customSearchMarker) {
                map.removeLayer(customSearchMarker);
            }
            nearestLines.forEach(line => map.removeLayer(line));
            nearestLines = [];

            // 2. 在地圖放上醒目的橘色五角星定位標記
            const orangeStarIcon = L.divIcon({
                html: `
                    <div class="relative flex items-center justify-center">
                        <span class="absolute inline-flex h-10 w-10 rounded-full bg-orange-400 opacity-40 animate-ping"></span>
                        <div class="relative flex items-center justify-center w-8 h-8 rounded-full bg-orange-500 text-white shadow-xl border-2 border-white">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="text-white"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </div>
                    </div>`,
                className: 'custom-search-marker',
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });

            customSearchMarker = L.marker([coord.lat, coord.lng], { icon: orangeStarIcon }).addTo(map);
            customSearchMarker.bindPopup(`
                <div class="p-1">
                    <span class="inline-block px-1.5 py-0.5 bg-orange-100 text-orange-800 text-[9px] font-bold rounded-md mb-1">🗺️ 自訂定位點</span>
                    <p class="text-xs font-bold text-slate-800 m-0">${inputVal}</p>
                    <p class="text-[10px] text-slate-400 mt-1">已為您繪製與最近 3 站公車亭的導引虛線</p>
                </div>
            `).openPopup();

            // 3. 計算與 106 個站點的距離並找出最近的 3 站
            const stationsWithDistance = data.map((item, index) => {
                const distance = map.distance([coord.lat, coord.lng], [item.lat, item.lng]); // 單位為公尺
                return { item, distance, index };
            });

            // 依距離由近到遠排序
            stationsWithDistance.sort((a, b) => a.distance - b.distance);
            const nearestThree = stationsWithDistance.slice(0, 3);

            // 4. 繪製導引虛線，並更新對應候車亭的 Popup
            nearestThree.forEach((near, i) => {
                const colors = ['#f97316', '#fb923c', '#fdba74']; // 近 ➡️ 遠 (深橘 ➡️ 淺橘)
                const line = L.polyline([[coord.lat, coord.lng], [near.item.lat, near.item.lng]], {
                    color: colors[i],
                    weight: 3 - (i * 0.5),
                    dashArray: '5, 8',
                    opacity: 0.8
                }).addTo(map);
                nearestLines.push(line);

                // 為最近的站點 Marker 綁定距離提示文字
                const marker = markersMap.get(`station-${near.index}`);
                if (marker) {
                    const km = (near.distance / 1000).toFixed(2);
                    marker.bindTooltip(`距離定位點: ${km} 公里`, { permanent: false, direction: 'top' });
                }
            });

            // 5. 地圖平滑移至定位點，並調整適當視野以容納定位點與最近的站點
            const bounds = L.latLngBounds([coord.lat, coord.lng]);
            nearestThree.forEach(near => bounds.extend([near.item.lat, near.item.lng]));
            map.fitBounds(bounds, { padding: [50, 50] });

            showToast(`🎉 已成功尋獲該地址！並繪製出最近的 3 個候車亭連線`);
        }

        // 電腦版側邊欄 隱藏與顯現 切換
        function toggleSidebarDesktop() {
            const sidebar = document.getElementById('sidebar');
            const collapseIcon = document.getElementById('collapse-icon');
            
            const isCurrentlyCollapsed = sidebar.classList.contains('sidebar-collapsed');

            if (isCurrentlyCollapsed) {
                // 展開面板
                sidebar.classList.remove('sidebar-collapsed', '-translate-x-full', 'md:-ml-96');
                collapseIcon.setAttribute('data-lucide', 'chevron-left');
                showToast("已顯示搜尋側邊欄");
            } else {
                // 隱藏/折疊面板
                sidebar.classList.add('sidebar-collapsed', '-translate-x-full', 'md:-ml-96');
                collapseIcon.setAttribute('data-lucide', 'chevron-right');
                showToast("已隱藏搜尋側邊欄");
            }

            // 更新 Lucide 圖樣
            lucide.createIcons();

            // 重要：地圖尺寸動態重繪（等側邊欄 CSS 位移動畫完成後執行，避免地圖破圖）
            setTimeout(() => {
                map.invalidateSize();
            }, 310);
        }

        function setupEventListeners() {
            const townFilterSelect = document.getElementById('town-filter');
            const searchInput = document.getElementById('search-input');
            const clearSearchBtn = document.getElementById('clear-search');
            const customAddressInput = document.getElementById('custom-address-input');
            const searchAddressBtn = document.getElementById('btn-search-address');

            // 鄉鎮市下拉選單變更事件
            townFilterSelect.addEventListener('change', renderDashboard);

            // 分類按鈕事件綁定
            const categoryButtons = document.querySelectorAll('.category-btn');
            categoryButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    categoryButtons.forEach(b => {
                        b.className = "category-btn px-2.5 py-1 text-xs font-medium rounded-full bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition";
                    });
                    this.className = "category-btn px-2.5 py-1 text-xs font-medium rounded-full bg-brand-600 text-white shadow-sm transition";
                    currentCategory = this.getAttribute('data-category');
                    renderDashboard();
                });
            });

            // 關鍵字搜尋即時輸入事件 (偵聽 input 以達到即時反應)
            searchInput.addEventListener('input', function(e) {
                const value = e.target.value.trim();
                if (value.length > 0) {
                    clearSearchBtn.classList.remove('hidden');
                } else {
                    clearSearchBtn.classList.add('hidden');
                }
                renderDashboard();
            });

            // 清除搜尋按鈕點擊事件
            clearSearchBtn.addEventListener('click', function() {
                searchInput.value = '';
                clearSearchBtn.classList.add('hidden');
                renderDashboard();
                searchInput.focus();
            });

            // 自訂地址搜尋事件 (點選按鈕 / 按下 Enter 鍵)
            searchAddressBtn.addEventListener('click', searchCustomAddress);
            customAddressInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchCustomAddress();
                }
            });

            // 底圖切換器按鈕事件
            const osmBtn = document.getElementById('layer-osm');
            const lightBtn = document.getElementById('layer-light');
            const darkBtn = document.getElementById('layer-dark');

            function updateLayerActiveState(activeBtn) {
                [osmBtn, lightBtn, darkBtn].forEach(btn => {
                    btn.className = "px-3 py-1.5 text-xs font-semibold rounded-lg bg-white text-slate-600 hover:text-slate-800 hover:bg-slate-50 transition";
                });
                activeBtn.className = "px-3 py-1.5 text-xs font-semibold rounded-lg bg-brand-600 text-white shadow-sm transition";
            }

            osmBtn.addEventListener('click', () => {
                map.removeLayer(layers.light);
                map.removeLayer(layers.dark);
                map.addLayer(layers.osm);
                updateLayerActiveState(osmBtn);
                showToast("已切換至標準開放街圖");
            });

            lightBtn.addEventListener('click', () => {
                map.removeLayer(layers.osm);
                map.removeLayer(layers.dark);
                map.addLayer(layers.light);
                updateLayerActiveState(lightBtn);
                showToast("已切換至高質感明亮底圖");
            });

            darkBtn.addEventListener('click', () => {
                map.removeLayer(layers.osm);
                map.removeLayer(layers.light);
                map.addLayer(layers.dark);
                updateLayerActiveState(darkBtn);
                showToast("已切換至夜間極黑底圖");
            });

            // 使用者 GPS 定位功能
            const locateBtn = document.getElementById('btn-locate');
            locateBtn.addEventListener('click', function() {
                locateBtn.classList.add('animate-pulse');
                showToast("正在獲取您的目前位置...");

                map.locate({ setView: true, maxZoom: 15 });
            });

            // 定位成功回呼
            map.on('locationfound', function(e) {
                locateBtn.classList.remove('animate-pulse');
                
                // 移除先前的定位點
                if (activeUserMarker) {
                    map.removeLayer(activeUserMarker);
                }

                // 自訂目前定位標記樣式 (修正為精準的 Tailwind 寬高尺寸)
                const userIcon = L.divIcon({
                    html: `
                        <div class="relative flex items-center justify-center">
                            <span class="absolute inline-flex h-6 w-6 rounded-full bg-emerald-400 opacity-75 animate-ping"></span>
                            <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500 border-2 border-white shadow-lg"></span>
                        </div>`,
                    className: 'user-location-marker'
                });

                activeUserMarker = L.marker(e.latlng, { icon: userIcon }).addTo(map);
                activeUserMarker.bindPopup('<p class="text-xs font-bold text-center text-slate-800 m-0">📍 您的目前位置</p>').openPopup();
                showToast("已成功定位目前位置！");
            });

            // 定位失敗回呼
            map.on('locationerror', function(e) {
                locateBtn.classList.remove('animate-pulse');
                showToast("無法取得定位，請確認瀏覽器定位權限是否開啟");
            });

            // 重設地圖中心視野
            const resetViewBtn = document.getElementById('btn-reset-view');
            resetViewBtn.addEventListener('click', function() {
                // 清除自訂搜尋點與虛線
                if (customSearchMarker) {
                    map.removeLayer(customSearchMarker);
                    customSearchMarker = null;
                }
                nearestLines.forEach(line => map.removeLayer(line));
                nearestLines = [];

                map.flyTo([23.98, 120.48], 11, {
                    animate: true,
                    duration: 1.2
                });
                showToast("地圖視野已還原至全彰化縣範圍");
            });

            // 電腦版側邊欄折疊按鈕事件
            const collapseTrigger = document.getElementById('sidebar-collapse-trigger');
            collapseTrigger.addEventListener('click', toggleSidebarDesktop);

            // 手機版側邊欄開關事件
            const toggleSidebarBtnMobile = document.getElementById('toggle-sidebar-mobile');
            const closeSidebarBtnMobile = document.getElementById('close-sidebar-mobile');
            const overlay = document.getElementById('sidebar-overlay');

            toggleSidebarBtnMobile.addEventListener('click', () => toggleSidebarMobile(true));
            closeSidebarBtnMobile.addEventListener('click', () => toggleSidebarMobile(false));
            overlay.addEventListener('click', () => toggleSidebarMobile(false));
        }

        // 手機版側邊欄顯示/隱藏切換
        function toggleSidebarMobile(show) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 50);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        // 自訂精美 Toast 通知
        function showToast(text) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            
            toastText.textContent = text;
            toast.className = toast.className.replace('translate-y-12 opacity-0 pointer-events-none', '-translate-y-2 opacity-100 pointer-events-auto');
            
            setTimeout(() => {
                toast.className = toast.className.replace('-translate-y-2 opacity-100 pointer-events-auto', 'translate-y-12 opacity-0 pointer-events-none');
            }, 3000);
        }
    </script>
</body>
